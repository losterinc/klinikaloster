# Sveltia CMS configuration (Decap-compatible format).
# Mirrors the Astro Zod schemas in src/content/content.config.ts — keep them in sync.
#
# Auth: editing the remote repo uses GitHub OAuth via the free self-hosted
# `sveltia-cms-auth` relay (Cloudflare Worker). Set `base_url` to that relay.
# For local editing run the dev server (`npm run dev`) and open
# http://localhost:4321/admin/index.html in Chrome/Edge, then click "Work with
# Local Repository" — Sveltia edits files on disk via the File System Access API
# (no proxy server; the `local_backend` option below is ignored by Sveltia).

backend:
  name: github
  repo: losterinc/klinikaloster
  branch: main
  # TODO: set to your deployed sveltia-cms-auth Worker URL:
  # base_url: https://auth.example.workers.dev

# Paths are resolved relative to the GIT REPOSITORY ROOT (the folder containing
# `.git`), which is the parent of this Astro project — hence the `website/`
# prefix. In "Work with Local Repository" select that repo root, not `website/`.
media_folder: /public/uploads
public_folder: /uploads # public URL path in the built site (unchanged)

# Bilingual content: one file per locale, named <slug>.<locale>.<ext>.
# English is OPTIONAL — Polish (the default locale) is the only required one.
# New entries start with just Polish enabled (`initial_locales: default`); an
# editor can turn English on per entry via the editor's three-dot menu. Field
# requirements are scoped to `[pl]` below so a missing English translation never
# blocks saving.
i18n:
  structure: multiple_files
  locales: [pl, en]
  default_locale: pl
  initial_locales: default

collections:
  # --- Ustawienia kliniki (singleton, per-locale JSON) ---
  - name: settings
    label: Ustawienia
    i18n: true
    files:
      - name: clinic
        label: Dane kliniki
        file: src/content/data/settings.json
        i18n: true
        fields:
          - { name: clinicName, label: Nazwa kliniki, widget: string }
          - { name: tagline, label: Hasło, widget: string, required: false }
          - { name: logo, label: Logo, widget: image, required: false, i18n: duplicate }
          - name: address
            label: Adres
            widget: object
            fields:
              - { name: street, label: Ulica, widget: string }
              - { name: postalCode, label: Kod pocztowy, widget: string, i18n: duplicate }
              - { name: city, label: Miasto, widget: string }
              - { name: country, label: Kraj, widget: string, default: Polska }
          - { name: phone, label: Telefon, widget: string, i18n: duplicate }
          - { name: sms, label: SMS, widget: string, required: false, i18n: duplicate }
          - { name: email, label: E-mail, widget: string, i18n: duplicate }
          - { name: mapEmbedUrl, label: Mapa (embed URL), widget: string, required: false, i18n: duplicate }
          - { name: mapLink, label: Mapa (link), widget: string, required: false, i18n: duplicate }
          - name: geo
            label: Współrzędne
            widget: object
            required: false
            i18n: duplicate
            fields:
              - { name: lat, label: Szerokość, widget: number, value_type: float }
              - { name: lng, label: Długość, widget: number, value_type: float }
          - name: openingHours
            label: Godziny otwarcia
            widget: list
            fields:
              - { name: days, label: Dni, widget: string }
              - { name: hours, label: Godziny, widget: string, i18n: duplicate }
          - name: social
            label: Media społecznościowe
            widget: object
            required: false
            i18n: duplicate
            fields:
              - { name: facebook, label: Facebook, widget: string, required: false }
              - { name: instagram, label: Instagram, widget: string, required: false }

  # --- Zespół ---
  - name: team
    label: Zespół
    label_singular: Osoba
    folder: src/content/team
    create: true
    slug: '{{slug}}'
    summary: '{{name}}'
    sortable_fields: [order]
    reorder: true
    fields:
      - { name: name, label: Imię i nazwisko, widget: string }
      - { name: title, label: Tytuł / stanowisko, widget: string }
      - { name: specialties, label: Specjalizacje, widget: list, field: { name: item, label: Specjalizacja, widget: string }, i18n: true, required: [pl] }
      - { name: photo, label: Zdjęcie, widget: image, required: false, i18n: duplicate }
      # Kolejność ustawiana przez przeciąganie na liście wpisów (reorder); ukryta w edytorze.
      - { name: order, label: Kolejność, widget: hidden, default: 0, i18n: duplicate }
      - { name: draft, label: Szkic, widget: boolean, default: false, i18n: duplicate }
      - { name: body, label: Biogram, widget: markdown }

  # --- Oferta / cennik ---
  - name: services
    label: Oferta
    label_singular: Usługa
    folder: src/content/services
    create: true
    i18n: false
    slug: '{{slug}}'
    summary: '{{name}}'
    sortable_fields: [order]
    reorder: true
    fields:
      - { name: name, label: Nazwa usługi, widget: string }
      - { name: description, label: Opis, widget: text }
      - { name: price, label: Cena, widget: string, required: false }
      - { name: category, label: Kategoria, widget: string, required: false }
      - { name: order, label: Kolejność, widget: hidden, default: 0, i18n: duplicate }
      - { name: homepage, label: Widoczne na stronie glownej, widget: boolean, default: false, i18n: duplicate }
      - { name: body, label: Szczegóły, widget: markdown, required: false }

  # --- Wskazania do leczenia ---
  - name: indications
    label: Wskazania
    label_singular: Wskazanie
    folder: src/content/indications
    create: true
    i18n: false
    slug: '{{slug}}'
    summary: '{{title}}'
    sortable_fields: [order]
    reorder: true
    fields:
      - { name: title, label: Tytuł, widget: string}
      - { name: summary, label: Podsumowanie, widget: text, required: false }
      - { name: image, label: Obraz, widget: image, required: false, i18n: duplicate }
      - { name: order, label: Kolejność, widget: hidden, default: 0, i18n: duplicate }
      - { name: homepage, label: Widoczne na stronie glownej, widget: boolean, default: false, i18n: duplicate }
      - { name: draft, label: Szkic, widget: boolean, default: false, i18n: duplicate }
      - { name: body, label: Treść, widget: markdown, }

  # --- Strony (treść + SEO) ---
  - name: pages
    label: Strony
    label_singular: Strona
    folder: src/content/pages
    create: true
    slug: '{{slug}}'
    summary: '{{title}}'
    fields:
      - { name: title, label: Tytuł strony, widget: string}
      - { name: heroTitle, label: Nagłówek (hero), widget: string, required: false}
      - { name: heroSubtitle, label: Podtytuł (hero), widget: text, required: false }
      - { name: heroImage, label: Tło sekcji hero, widget: image, required: false, i18n: duplicate }
      - { name: heroSecondaryImage, label: Zdjęcie w sekcji hero (po prawej), widget: image, required: false, i18n: duplicate }
      - { name: bookingTitle, label: 'Nagłówek sekcji „Umów wizytę”', widget: string, required: false }
      - name: bookingWidgets
        label: 'Widżety „Umów wizytę” (ZnanyLekarz)'
        label_singular: Widżet
        widget: list
        required: false
        i18n: duplicate
        fields:
          - { name: doctor, label: 'Identyfikator profilu ZnanyLekarz', widget: string }
      - name: seo
        label: SEO
        widget: object
        required: false
        i18n: true
        fields:
          - { name: title, label: Tytuł SEO, widget: string, required: false }
          - { name: description, label: Opis SEO, widget: text, required: false }
          - { name: ogImage, label: Obraz OG, widget: image, required: false, i18n: duplicate }
      - { name: body, label: Treść, widget: markdown, required: false }
